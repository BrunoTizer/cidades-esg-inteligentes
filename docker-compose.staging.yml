# Override para ambiente de STAGING
# Uso: docker compose -p esg-staging -f docker-compose.yml -f docker-compose.staging.yml up -d
# Expõe a API via Nginx na porta 8081 do host.

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-brunotizer}/cidades-esg-api:${APP_VERSION:-latest}
    pull_policy: always
    environment:
      SPRING_PROFILES_ACTIVE: staging
      APP_VERSION: ${APP_VERSION:-staging}
    ports: []  # expomos apenas via Nginx

  nginx:
    ports:
      - "8081:80"

  postgres:
    ports: []

  redis:
    ports: []
