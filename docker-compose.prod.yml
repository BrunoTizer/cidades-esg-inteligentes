# Override para ambiente de PRODUÇÃO
# Uso: docker compose -p esg-prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# Expõe a API via Nginx na porta 8082 do host, com limites de recurso.

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-brunotizer}/cidades-esg-api:${APP_VERSION:-latest}
    pull_policy: always
    environment:
      SPRING_PROFILES_ACTIVE: production
      APP_VERSION: ${APP_VERSION:-latest}
    ports: []  # expomos apenas via Nginx
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M

  nginx:
    ports:
      - "8082:80"

  postgres:
    ports: []

  redis:
    ports: []
