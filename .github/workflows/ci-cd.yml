name: CI/CD Pipeline - Cidades ESG Inteligentes

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: brunotizer
  IMAGE_NAME: brunotizer/cidades-esg-api
  JAVA_VERSION: '21'

jobs:
  # ============================================================
  # JOB 1: BUILD E TESTES (Maven)
  # ============================================================
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build e testes automatizados com Maven
        run: mvn verify -B

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
        continue-on-error: true

  # ============================================================
  # JOB 2: BUILD E PUSH DA IMAGEM DOCKER (ghcr.io)
  # ============================================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    outputs:
      image-version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar versão da imagem
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: DEPLOY EM STAGING (VM Azure)
  # ============================================================
  deploy-staging:
    name: Deploy - Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    permissions:
      packages: read
    environment:
      name: staging
      url: http://51.120.75.55:8081/

    steps:
      - name: Deploy em Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /opt/cidades-esg-staging

            # Baixar os compose files atualizados do repositório
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/docker-compose.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/docker-compose.staging.yml -o docker-compose.staging.yml
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/nginx/nginx.conf -o nginx/nginx.conf
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/scripts/init-db.sql -o scripts/init-db.sql

            # Login no GHCR usando o GITHUB_TOKEN do workflow (scope packages:read)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Variáveis do ambiente staging
            export APP_VERSION="sha-${{ needs.docker-build.outputs.image-version }}"
            export IMAGE_OWNER="brunotizer"
            export POSTGRES_PASSWORD="${{ secrets.STAGING_POSTGRES_PASSWORD }}"
            export JWT_SECRET="${{ secrets.STAGING_JWT_SECRET }}"
            export REDIS_PASSWORD="staging_redis_pwd"

            echo "Deploy em Staging — versão $APP_VERSION"

            docker compose -p esg-staging -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -p esg-staging -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans

            echo "Aguardando API ficar saudável..."
            for i in $(seq 1 40); do
              if curl -sf http://localhost:8081/api/health > /dev/null; then
                echo "Staging OK!"
                break
              fi
              sleep 3
            done

            echo ""
            echo "=== Containers Staging ==="
            docker compose -p esg-staging ps

            echo ""
            echo "=== Smoke test Staging ==="
            curl -sf http://localhost:8081/api/health
            echo ""
            curl -sf http://localhost:8081/ | head -c 300

  # ============================================================
  # JOB 4: TESTES DE INTEGRAÇÃO EM STAGING
  # ============================================================
  integration-tests-staging:
    name: Testes de Integração - Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Smoke tests públicos em Staging
        run: |
          BASE_URL="http://51.120.75.55:8081"
          echo "Testando endpoint raiz..."
          curl -f "$BASE_URL/"
          echo ""
          echo "Testando health check..."
          curl -f "$BASE_URL/api/health"
          echo ""
          echo "Testando API de cidades..."
          curl -f "$BASE_URL/api/cidades" | head -c 300
          echo ""
          echo "Testando API de indicadores..."
          curl -f "$BASE_URL/api/indicadores" | head -c 300
          echo ""
          echo "Testando resumo..."
          curl -f "$BASE_URL/api/indicadores/resumo/geral"
          echo ""
          echo "Todos os smoke tests em Staging passaram!"

  # ============================================================
  # JOB 5: DEPLOY EM PRODUÇÃO (VM Azure)
  # ============================================================
  deploy-production:
    name: Deploy - Produção
    runs-on: ubuntu-latest
    needs: [docker-build, integration-tests-staging]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: read
    environment:
      name: production
      url: http://51.120.75.55:8082/

    steps:
      - name: Deploy em Produção via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /opt/cidades-esg-prod

            # Baixar os compose files atualizados
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/docker-compose.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/docker-compose.prod.yml -o docker-compose.prod.yml
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/nginx/nginx.conf -o nginx/nginx.conf
            curl -sSL https://raw.githubusercontent.com/BrunoTizer/cidades-esg-inteligentes/main/scripts/init-db.sql -o scripts/init-db.sql

            # Login no GHCR usando GITHUB_TOKEN
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Backup do banco antes do deploy (se container existir)
            if docker ps --format '{{.Names}}' | grep -q 'esg-prod-postgres'; then
              BACKUP_FILE=/backups/prod-$(date +%Y%m%d-%H%M%S).sql
              echo "Backup do banco em $BACKUP_FILE"
              docker exec $(docker ps -qf name=esg-prod-postgres) pg_dump -U esguser esgdb > $BACKUP_FILE || true
            fi

            # Variáveis de produção
            export APP_VERSION="sha-${{ needs.docker-build.outputs.image-version }}"
            export IMAGE_OWNER="brunotizer"
            export POSTGRES_PASSWORD="${{ secrets.PROD_POSTGRES_PASSWORD }}"
            export JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}"
            export REDIS_PASSWORD="prod_redis_pwd"

            echo "Deploy em Produção — versão $APP_VERSION"

            docker compose -p esg-prod -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -p esg-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "Aguardando API ficar saudável em PRODUÇÃO..."
            for i in $(seq 1 40); do
              if curl -sf http://localhost:8082/api/health > /dev/null; then
                echo "Produção OK!"
                break
              fi
              sleep 3
            done

            echo ""
            echo "=== Containers Produção ==="
            docker compose -p esg-prod ps

            echo ""
            echo "=== Validação final em Produção ==="
            curl -sf http://localhost:8082/api/health
            echo ""
            INFO=$(curl -sf http://localhost:8082/)
            echo "$INFO"
            if ! echo "$INFO" | grep -q '"ambiente":"production"'; then
              echo "ERRO: Ambiente retornado não é production!"
              exit 1
            fi
            echo "Deploy em produção validado!"

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ needs.docker-build.outputs.image-version }}
          name: Release ${{ needs.docker-build.outputs.image-version }}
          body: |
            ## Deploy em Produção — Cidades ESG Inteligentes

            **Commit:** `${{ github.sha }}`
            **Imagem:** `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.docker-build.outputs.image-version }}`
            **Ambiente Staging:** http://51.120.75.55:8081/
            **Ambiente Produção:** http://51.120.75.55:8082/

            Pipeline completo: build → testes (11) → imagem Docker → staging → integração → produção.
          draft: false
          prerelease: false
        continue-on-error: true
