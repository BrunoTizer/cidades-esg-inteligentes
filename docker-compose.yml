
# ==================================================
# Cidades ESG Inteligentes - Docker Compose
# Use `-p esg-<ambiente>` para isolar os stacks na mesma máquina:
#   docker compose -p esg-staging up -d
#   docker compose -p esg-prod up -d
# ==================================================

networks:
  esg-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:

services:

  # ------------------------------------------------
  # API Principal (Java Spring Boot)
  # ------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: cidades-esg-api:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-development}
      PORT: 8080
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-esguser}:${POSTGRES_PASSWORD:-esgpass}@postgres:5432/${POSTGRES_DB:-esgdb}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esg-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.projeto=cidades-esg"
      - "com.servico=api"

  # ------------------------------------------------
  # Banco de Dados PostgreSQL
  # ------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esgpass}
      POSTGRES_DB: ${POSTGRES_DB:-esgdb}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - esg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esguser} -d ${POSTGRES_DB:-esgdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.projeto=cidades-esg"
      - "com.servico=banco"

  # ------------------------------------------------
  # Cache Redis
  # ------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - esg-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "com.projeto=cidades-esg"
      - "com.servico=cache"

  # ------------------------------------------------
  # Nginx Reverse Proxy
  # ------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - esg-network
    labels:
      - "com.projeto=cidades-esg"
      - "com.servico=proxy"

  # ------------------------------------------------
  # Prometheus (perfil 'monitoring')
  # ------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - esg-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    profiles:
      - monitoring

  # ------------------------------------------------
  # Grafana (perfil 'monitoring')
  # ------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    networks:
      - esg-network
    depends_on:
      - prometheus
    profiles:
      - monitoring
