# docker-compose.override.yml
# Carregado automaticamente em desenvolvimento local (junto com docker-compose.yml).
# Expõe portas para facilitar debug local.
# Em staging/prod este arquivo NÃO é carregado (usa-se -f explicitamente).

services:
  api:
    ports:
      - "${API_PORT:-8080}:8080"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
